<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Word Lookup</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      color: white;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }

    header p {
      margin-top: 0.5rem;
      opacity: 0.85;
      font-size: 1.05rem;
    }

    .search-card {
      background: white;
      border-radius: 20px;
      padding: 2rem;
      width: 100%;
      max-width: 680px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    .search-row {
      display: flex;
      gap: 0.75rem;
    }

    #wordInput {
      flex: 1;
      padding: 0.85rem 1.2rem;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 1.1rem;
      outline: none;
      transition: border-color 0.2s;
      color: #1a202c;
    }

    #wordInput:focus {
      border-color: #667eea;
    }

    #searchBtn {
      padding: 0.85rem 1.6rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    #searchBtn:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    #searchBtn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .results {
      margin-top: 1.5rem;
      display: none;
    }

    .results.visible {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }

    @media (max-width: 560px) {
      .results.visible {
        grid-template-columns: 1fr;
      }
    }

    .result-box {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 1.25rem;
      min-height: 180px;
    }

    .result-box h3 {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #667eea;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .definition-content {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #2d3748;
      min-height: 120px;
    }

    .definition-content h2 {
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
      color: #1a202c;
    }

    .definition-content strong {
      color: #4a5568;
    }

    .definition-content p {
      margin-bottom: 0.4rem;
    }

    .definition-content ol, .definition-content ul {
      margin-left: 1.2rem;
      margin-bottom: 0.4rem;
    }

    .image-box {
      display: flex;
      flex-direction: column;
    }

    .image-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      border-radius: 10px;
      overflow: hidden;
      background: #edf2f7;
    }

    #generatedImage {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 10px;
      display: none;
    }

    .image-placeholder {
      color: #a0aec0;
      font-size: 0.9rem;
      text-align: center;
      padding: 1rem;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #e2e8f0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #667eea;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .error-msg {
      color: #e53e3e;
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }

    .examples-hint {
      margin-top: 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .chip {
      background: #eef2ff;
      color: #667eea;
      border: 1px solid #c7d2fe;
      border-radius: 20px;
      padding: 0.3rem 0.9rem;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .chip:hover {
      background: #e0e7ff;
    }
  </style>
</head>
<body>
  <header>
    <h1>📖 English Word Lookup</h1>
    <p>Enter any English word or idiom to get an instant definition and image</p>
  </header>

  <div class="search-card">
    <div class="search-row">
      <input
        type="text"
        id="wordInput"
        placeholder="e.g. serendipity, break a leg, ambivalent..."
        autocomplete="off"
        spellcheck="false"
      />
      <button id="searchBtn">Look Up</button>
    </div>
    <div id="errorMsg" class="error-msg"></div>

    <div class="examples-hint" id="examplesHint">
      <span class="chip" data-word="serendipity">serendipity</span>
      <span class="chip" data-word="break a leg">break a leg</span>
      <span class="chip" data-word="ephemeral">ephemeral</span>
      <span class="chip" data-word="bite the bullet">bite the bullet</span>
      <span class="chip" data-word="resilience">resilience</span>
    </div>

    <div class="results" id="results">
      <div class="result-box">
        <h3>📝 Definition</h3>
        <div class="definition-content" id="definitionContent">
          <span class="image-placeholder">Definition will appear here...</span>
        </div>
      </div>

      <div class="result-box image-box">
        <h3>🎨 Image</h3>
        <div class="image-container" id="imageContainer">
          <div class="image-placeholder">Image will appear here...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const wordInput = document.getElementById('wordInput');
    const searchBtn = document.getElementById('searchBtn');
    const definitionContent = document.getElementById('definitionContent');
    const imageContainer = document.getElementById('imageContainer');
    const results = document.getElementById('results');
    const errorMsg = document.getElementById('errorMsg');

    // Example chips
    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        wordInput.value = chip.dataset.word;
        lookup();
      });
    });

    wordInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') lookup();
    });

    searchBtn.addEventListener('click', lookup);

    function setLoading(loading) {
      searchBtn.disabled = loading;
      searchBtn.textContent = loading ? 'Looking up...' : 'Look Up';
    }

    function showImageSpinner() {
      imageContainer.innerHTML = '<div class="spinner"></div>';
    }

    function showImageError() {
      imageContainer.innerHTML = '<div class="image-placeholder">Image could not be generated</div>';
    }

    function loadImage(word) {
      showImageSpinner();
      const prompt = encodeURIComponent(
        `${word}, beautiful illustration, artistic, vibrant colors, detailed, high quality`
      );
      const img = new Image();
      img.src = `https://image.pollinations.ai/prompt/${prompt}?width=512&height=512&nologo=true&seed=${Date.now()}`;
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:10px;';
      img.onload = () => {
        imageContainer.innerHTML = '';
        imageContainer.appendChild(img);
      };
      img.onerror = showImageError;
    }

    // Simple markdown-to-HTML renderer for Claude's output
    function renderMarkdown(text) {
      return text
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>\n?)+/g, '<ol>$&</ol>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>\n?)+/g, match => match.startsWith('<ol>') ? match : `<ul>${match}</ul>`)
        .replace(/\n\n/g, '</p><p>')
        .replace(/\n/g, '<br>');
    }

    async function lookup() {
      const word = wordInput.value.trim();
      if (!word) {
        errorMsg.textContent = 'Please enter a word or idiom.';
        return;
      }
      errorMsg.textContent = '';
      setLoading(true);
      results.classList.add('visible');

      // Reset definition area
      definitionContent.innerHTML = '<span class="cursor"></span>';

      // Start image generation in parallel
      loadImage(word);

      let rawText = '';
      let done = false;

      try {
        const response = await fetch('/api/lookup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ word }),
        });

        if (!response.ok) {
          throw new Error(`Server error: ${response.status}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (!done) {
          const { value, done: streamDone } = await reader.read();
          if (streamDone) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop(); // keep incomplete line

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            try {
              const parsed = JSON.parse(line.slice(6));
              if (parsed.type === 'text') {
                rawText += parsed.content;
                definitionContent.innerHTML = renderMarkdown(rawText) + '<span class="cursor"></span>';
              } else if (parsed.type === 'done') {
                done = true;
                definitionContent.innerHTML = renderMarkdown(rawText);
              } else if (parsed.type === 'error') {
                errorMsg.textContent = parsed.message;
                definitionContent.innerHTML = '<span class="image-placeholder">Could not fetch definition.</span>';
              }
            } catch {
              // Ignore parse errors for malformed lines
            }
          }
        }
      } catch (err) {
        errorMsg.textContent = 'Connection error. Is the server running?';
        definitionContent.innerHTML = '<span class="image-placeholder">Error loading definition.</span>';
      } finally {
        if (!done && rawText) {
          definitionContent.innerHTML = renderMarkdown(rawText);
        }
        setLoading(false);
      }
    }
  </script>
</body>
</html>
